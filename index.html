<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#F5F1FF" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0E0B1F" media="(prefers-color-scheme: dark)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="메모" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>메모</title>
  <style>
    :root {
      --bg-top: #F5F1FF;
      --bg-bottom: #EDE7FF;
      --surface: #FFFFFF;
      --top-bar: #FFFFFF;
      --divider: rgba(0, 0, 0, 0.08);
      --text-primary: #1E1B2E;
      --text-secondary: #6B6880;
      --text-hint: #B0AEC4;
      --accent: #7B61FF;
      --accent-soft: #EDE7FF;
      --accent-on: #FFFFFF;
      --shadow-card: 0 10px 28px rgba(123, 97, 255, 0.14);
      --shadow-top: 0 4px 16px rgba(123, 97, 255, 0.08);
      --shadow-fab: 0 12px 28px rgba(123, 97, 255, 0.42);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-top: #0E0B1F;
        --bg-bottom: #1A1438;
        --surface: #1E1B33;
        --top-bar: #181430;
        --divider: rgba(255, 255, 255, 0.08);
        --text-primary: #EDEAF7;
        --text-secondary: #A09DB8;
        --text-hint: #6B6880;
        --accent: #9C85FF;
        --accent-soft: #2A2350;
        --accent-on: #1E1B33;
        --shadow-card: 0 10px 28px rgba(0, 0, 0, 0.45);
        --shadow-top: 0 4px 16px rgba(0, 0, 0, 0.35);
        --shadow-fab: 0 12px 28px rgba(156, 133, 255, 0.32);
      }
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overscroll-behavior: none;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
        "Noto Sans KR", "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
    }

    .top-bar {
      display: flex;
      align-items: center;
      background: var(--top-bar);
      padding: 20px 12px 20px 24px;
      border-bottom-left-radius: 24px;
      border-bottom-right-radius: 24px;
      box-shadow: var(--shadow-top);
      animation: fadeIn 0.7s ease-out 0.15s both;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      margin-right: 10px;
      flex-shrink: 0;
    }

    .title {
      flex: 1;
      margin: 0;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--text-primary);
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      border: none;
      background: transparent;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-secondary);
      transition: background 0.18s ease;
      padding: 0;
      font-family: inherit;
    }
    .icon-btn:active { background: var(--accent-soft); }
    .icon-btn svg { width: 22px; height: 22px; }

    .card {
      flex: 1;
      margin: 20px 16px 12px 16px;
      padding: 28px 26px;
      background: var(--surface);
      border-radius: 24px;
      box-shadow: var(--shadow-card);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: slideUpFade 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .memo {
      flex: 1;
      border: none;
      outline: none;
      resize: none;
      background: transparent;
      color: var(--text-primary);
      font-size: 17px;
      line-height: 1.75;
      font-family: inherit;
      width: 100%;
      height: 100%;
      -webkit-user-select: text;
      user-select: text;
      padding: 0;
      overflow-y: auto;
      -webkit-appearance: none;
    }

    .char-count {
      align-self: flex-end;
      margin: 0 28px 92px;
      font-size: 12px;
      color: var(--text-secondary);
      letter-spacing: 0.04em;
      animation: fadeIn 0.6s ease-out 0.5s both;
    }

    .fab {
      position: fixed;
      right: 20px;
      bottom: calc(24px + env(safe-area-inset-bottom));
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--accent);
      color: var(--accent-on);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-fab);
      cursor: pointer;
      animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.4s both;
      transition: transform 0.12s ease;
      padding: 0;
    }
    .fab:active { transform: scale(0.92); }
    .fab svg { width: 24px; height: 24px; }

    .snackbar {
      position: fixed;
      left: 50%;
      bottom: calc(100px + env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(20px);
      background: var(--text-primary);
      color: var(--surface);
      padding: 12px 22px;
      border-radius: 24px;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
      z-index: 20;
    }
    .snackbar.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.42);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 30;
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
      animation: fadeIn 0.2s ease-out;
    }
    .modal-backdrop.show { display: flex; }
    .modal {
      background: var(--surface);
      color: var(--text-primary);
      padding: 24px;
      border-radius: 22px;
      max-width: 320px;
      width: calc(100% - 48px);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.3);
      animation: popIn 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .modal h3 {
      margin: 0 0 8px;
      font-size: 17px;
      font-weight: 700;
    }
    .modal p {
      margin: 0 0 22px;
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 4px;
    }
    .modal button {
      padding: 10px 18px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: var(--accent);
      font-family: inherit;
      transition: background 0.15s ease;
    }
    .modal button:active { background: var(--accent-soft); }
    .modal button.primary {
      background: var(--accent);
      color: var(--accent-on);
    }
    .modal button.primary:active {
      background: var(--accent);
      opacity: 0.85;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideUpFade {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.6); }
      100% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <header class="top-bar">
    <span class="dot" aria-hidden="true"></span>
    <h1 class="title">메모</h1>
    <button class="icon-btn" id="clearBtn" aria-label="메모 지우기">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M6,19c0,1.1 0.9,2 2,2h8c1.1,0 2,-0.9 2,-2V7H6v12zM19,4h-3.5l-1,-1h-5l-1,1H5v2h14V4z" />
      </svg>
    </button>
  </header>

  <div class="card">
    <textarea
      class="memo"
      id="memo"
      autofocus
      autocomplete="off"
      autocorrect="off"
      autocapitalize="sentences"
      spellcheck="false"></textarea>
  </div>

  <div class="char-count" id="charCount">0자</div>

  <button class="fab" id="shareFab" aria-label="메모 공유">
    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M18,16.08c-0.76,0 -1.44,0.3 -1.96,0.77L8.91,12.7c0.05,-0.23 0.09,-0.46 0.09,-0.7s-0.04,-0.47 -0.09,-0.7l7.05,-4.11C16.5,7.69 17.21,8 18,8c1.66,0 3,-1.34 3,-3s-1.34,-3 -3,-3 -3,1.34 -3,3c0,0.24 0.04,0.47 0.09,0.7L8.04,9.81C7.5,9.31 6.79,9 6,9c-1.66,0 -3,1.34 -3,3s1.34,3 3,3c0.79,0 1.5,-0.31 2.04,-0.81l7.12,4.16c-0.05,0.21 -0.08,0.43 -0.08,0.65 0,1.61 1.31,2.92 2.92,2.92 1.61,0 2.92,-1.31 2.92,-2.92s-1.31,-2.92 -2.92,-2.92z" />
    </svg>
  </button>

  <div class="snackbar" id="snackbar"></div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" role="dialog" aria-modal="true">
      <h3>메모를 지울까요?</h3>
      <p>작성된 모든 내용이 사라집니다.</p>
      <div class="modal-actions">
        <button id="cancelBtn">취소</button>
        <button class="primary" id="confirmBtn">지우기</button>
      </div>
    </div>
  </div>

  <script>
    const memo = document.getElementById('memo');
    const charCount = document.getElementById('charCount');
    const clearBtn = document.getElementById('clearBtn');
    const shareFab = document.getElementById('shareFab');
    const snackbar = document.getElementById('snackbar');
    const modalBackdrop = document.getElementById('modalBackdrop');
    const cancelBtn = document.getElementById('cancelBtn');
    const confirmBtn = document.getElementById('confirmBtn');

    const STORAGE_KEY = 'quickmemo';

    memo.value = localStorage.getItem(STORAGE_KEY) || '';
    updateCount();

    memo.addEventListener('input', () => {
      localStorage.setItem(STORAGE_KEY, memo.value);
      updateCount();
    });

    function updateCount() {
      charCount.textContent = `${memo.value.length}자`;
    }

    let snackTimer = null;
    function showSnackbar(text) {
      snackbar.textContent = text;
      snackbar.classList.add('show');
      clearTimeout(snackTimer);
      snackTimer = setTimeout(() => snackbar.classList.remove('show'), 2000);
    }

    clearBtn.addEventListener('click', () => modalBackdrop.classList.add('show'));
    cancelBtn.addEventListener('click', () => modalBackdrop.classList.remove('show'));
    modalBackdrop.addEventListener('click', (e) => {
      if (e.target === modalBackdrop) modalBackdrop.classList.remove('show');
    });
    confirmBtn.addEventListener('click', () => {
      memo.value = '';
      localStorage.setItem(STORAGE_KEY, '');
      updateCount();
      modalBackdrop.classList.remove('show');
      showSnackbar('메모를 비웠어요');
      memo.focus();
    });

    shareFab.addEventListener('click', async () => {
      const text = memo.value.trim();
      if (!text) {
        showSnackbar('공유할 내용이 없어요');
        return;
      }
      if (navigator.share) {
        try { await navigator.share({ text }); } catch (_) { /* canceled */ }
      } else {
        try {
          await navigator.clipboard.writeText(text);
          showSnackbar('클립보드에 복사했어요');
        } catch (_) {
          showSnackbar('공유를 지원하지 않는 환경이에요');
        }
      }
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
