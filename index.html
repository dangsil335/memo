<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" id="themeColorMeta" content="#FAFAF8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="메모" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png" />

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
  />

  <title>메모</title>
  <style>
    /* ===== LIGHT (default) ===== */
    :root {
      --bg: #FAFAF8;
      --surface: #FAFAF8;
      --divider: rgba(30, 27, 46, 0.10);
      --text-primary: #1E1B2E;
      --text-secondary: #6B6880;
      --accent: #6B4DFF;
      --accent-glow: rgba(107, 77, 255, 0.55);
      --accent-soft: #EFEAFF;
      --accent-on: #FFFFFF;
      --pill-accent-bg: rgba(107, 77, 255, 0.82);
      --pill-outline-bg: rgba(255, 255, 255, 0.55);
      --pill-outline-border: rgba(30, 27, 46, 0.10);
      --shadow-pill-accent: 0 6px 20px rgba(107, 77, 255, 0.28);
      --shadow-pill-outline: 0 4px 16px rgba(30, 27, 46, 0.06);
    }

    /* ===== DARK ===== */
    /* auto mode (no manual override) follows system */
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg: #0F0D14;
        --surface: #0F0D14;
        --divider: rgba(255, 255, 255, 0.12);
        --text-primary: #F3F1FF;
        --text-secondary: #8E8B9F;
        --accent: #9C85FF;
        --accent-glow: rgba(156, 133, 255, 0.55);
        --accent-soft: #2A2350;
        --accent-on: #0F0D14;
        --pill-accent-bg: rgba(156, 133, 255, 0.78);
        --pill-outline-bg: rgba(255, 255, 255, 0.06);
        --pill-outline-border: rgba(255, 255, 255, 0.12);
        --shadow-pill-accent: 0 8px 24px rgba(156, 133, 255, 0.32);
        --shadow-pill-outline: 0 6px 18px rgba(0, 0, 0, 0.35);
      }
    }
    /* manual dark override (works regardless of system) */
    :root[data-theme="dark"] {
      --bg: #0F0D14;
      --surface: #0F0D14;
      --divider: rgba(255, 255, 255, 0.12);
      --text-primary: #F3F1FF;
      --text-secondary: #8E8B9F;
      --accent: #9C85FF;
      --accent-glow: rgba(156, 133, 255, 0.55);
      --accent-soft: #2A2350;
      --accent-on: #0F0D14;
      --pill-accent-bg: rgba(156, 133, 255, 0.78);
      --pill-outline-bg: rgba(255, 255, 255, 0.06);
      --pill-outline-border: rgba(255, 255, 255, 0.12);
      --shadow-pill-accent: 0 8px 24px rgba(156, 133, 255, 0.32);
      --shadow-pill-outline: 0 6px 18px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overscroll-behavior: none;
    }

    body {
      font-family: "Pretendard Variable", Pretendard, -apple-system,
        BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR",
        "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      height: 100vh;
      height: 100dvh;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
      position: relative;
      transition: background-color 0.45s ease, color 0.3s ease;
    }

    .memo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      resize: none;
      background: transparent;
      color: var(--text-primary);
      font-size: 17px;
      font-weight: 420;
      line-height: 1.85;
      letter-spacing: -0.01em;
      font-family: inherit;
      text-align: center;
      padding: calc(72px + env(safe-area-inset-top)) 28px
        calc(40px + env(safe-area-inset-bottom));
      -webkit-user-select: text;
      user-select: text;
      overflow-y: auto;
      -webkit-appearance: none;
      caret-color: var(--accent);

      -webkit-mask-image: linear-gradient(
        to bottom,
        transparent 0,
        #000 56px,
        #000 calc(100% - 48px),
        transparent 100%
      );
      mask-image: linear-gradient(
        to bottom,
        transparent 0,
        #000 56px,
        #000 calc(100% - 48px),
        transparent 100%
      );

      scrollbar-width: thin;
      scrollbar-color: var(--accent) transparent;

      animation: fadeIn 0.6s ease-out 0.05s both;
    }

    .memo::-webkit-scrollbar { width: 2px; }
    .memo::-webkit-scrollbar-track { background: transparent; }
    .memo::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 1px;
    }

    @keyframes caretPulse {
      0%, 100% { caret-color: var(--accent); }
      50%      { caret-color: var(--accent-glow); }
    }
    .memo:focus {
      animation: fadeIn 0.6s ease-out 0.05s both,
                 caretPulse 2.4s ease-in-out 1s infinite;
    }

    .top-actions {
      position: absolute;
      top: calc(12px + env(safe-area-inset-top));
      right: calc(16px + env(safe-area-inset-right));
      display: flex;
      gap: 6px;
      z-index: 5;
      animation: dropIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) 0.25s both;
    }

    .pill {
      width: 56px;
      height: 36px;
      border: none;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.3s ease, color 0.3s ease;
      padding: 0;
      font-family: inherit;
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      backdrop-filter: blur(24px) saturate(180%);
    }
    .pill:active { transform: scale(0.94); }
    .pill svg {
      width: 18px;
      height: 18px;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .pill.accent {
      background: var(--pill-accent-bg);
      color: #FFFFFF;
      box-shadow: var(--shadow-pill-accent);
    }

    .pill.outline {
      background: var(--pill-outline-bg);
      color: var(--text-secondary);
      border: 1px solid var(--pill-outline-border);
      box-shadow: var(--shadow-pill-outline);
    }

    /* theme toggle icon swap animation */
    .pill .theme-icon {
      display: none;
    }
    .pill .theme-icon.active {
      display: block;
      animation: iconPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes iconPop {
      0% { opacity: 0; transform: scale(0.5) rotate(-45deg); }
      100% { opacity: 1; transform: scale(1) rotate(0); }
    }

    .snackbar {
      position: fixed;
      left: 50%;
      bottom: calc(40px + env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(20px);
      background: var(--text-primary);
      color: var(--bg);
      padding: 12px 22px;
      border-radius: 24px;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      z-index: 20;
    }
    .snackbar.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.42);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 30;
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
      animation: fadeIn 0.2s ease-out;
    }
    .modal-backdrop.show { display: flex; }
    .modal {
      background: var(--surface);
      color: var(--text-primary);
      padding: 24px;
      border-radius: 22px;
      max-width: 320px;
      width: calc(100% - 48px);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.3);
      animation: popIn 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
      text-align: left;
    }
    .modal h3 {
      margin: 0 0 8px;
      font-size: 17px;
      font-weight: 700;
    }
    .modal p {
      margin: 0 0 22px;
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 4px;
    }
    .modal button {
      padding: 10px 18px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: var(--accent);
      font-family: inherit;
      transition: background 0.15s ease;
    }
    .modal button:active { background: var(--accent-soft); }
    .modal button.primary {
      background: var(--accent);
      color: var(--accent-on);
    }
    .modal button.primary:active { opacity: 0.85; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes dropIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.6); }
      100% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <textarea
    class="memo"
    id="memo"
    autofocus
    autocomplete="off"
    autocorrect="off"
    autocapitalize="sentences"
    spellcheck="false"></textarea>

  <div class="top-actions">
    <button class="pill accent" id="shareFab" aria-label="메모 공유">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M18,16.08c-0.76,0 -1.44,0.3 -1.96,0.77L8.91,12.7c0.05,-0.23 0.09,-0.46 0.09,-0.7s-0.04,-0.47 -0.09,-0.7l7.05,-4.11C16.5,7.69 17.21,8 18,8c1.66,0 3,-1.34 3,-3s-1.34,-3 -3,-3 -3,1.34 -3,3c0,0.24 0.04,0.47 0.09,0.7L8.04,9.81C7.5,9.31 6.79,9 6,9c-1.66,0 -3,1.34 -3,3s1.34,3 3,3c0.79,0 1.5,-0.31 2.04,-0.81l7.12,4.16c-0.05,0.21 -0.08,0.43 -0.08,0.65 0,1.61 1.31,2.92 2.92,2.92 1.61,0 2.92,-1.31 2.92,-2.92s-1.31,-2.92 -2.92,-2.92z" />
      </svg>
    </button>

    <button class="pill outline" id="themeToggle" aria-label="테마 전환">
      <!-- AUTO: 반쪽 채워진 원 -->
      <svg class="theme-icon" data-mode="auto" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12,2 C6.48,2 2,6.48 2,12 C2,17.52 6.48,22 12,22 C17.52,22 22,17.52 22,12 C22,6.48 17.52,2 12,2 Z M12,4 C16.42,4 20,7.58 20,12 C20,16.42 16.42,20 12,20 L12,4 Z" />
      </svg>
      <!-- LIGHT: 태양 -->
      <svg class="theme-icon" data-mode="light" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <circle cx="12" cy="12" r="4.5"/>
        <g stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none">
          <line x1="12" y1="2.5" x2="12" y2="4.5"/>
          <line x1="12" y1="19.5" x2="12" y2="21.5"/>
          <line x1="2.5" y1="12" x2="4.5" y2="12"/>
          <line x1="19.5" y1="12" x2="21.5" y2="12"/>
          <line x1="5.2" y1="5.2" x2="6.6" y2="6.6"/>
          <line x1="17.4" y1="17.4" x2="18.8" y2="18.8"/>
          <line x1="5.2" y1="18.8" x2="6.6" y2="17.4"/>
          <line x1="17.4" y1="6.6" x2="18.8" y2="5.2"/>
        </g>
      </svg>
      <!-- DARK: 달 -->
      <svg class="theme-icon" data-mode="dark" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>

    <button class="pill outline" id="clearBtn" aria-label="메모 지우기">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M6,19c0,1.1 0.9,2 2,2h8c1.1,0 2,-0.9 2,-2V7H6v12zM19,4h-3.5l-1,-1h-5l-1,1H5v2h14V4z" />
      </svg>
    </button>
  </div>

  <div class="snackbar" id="snackbar"></div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" role="dialog" aria-modal="true">
      <h3>메모를 지울까요?</h3>
      <p>작성된 모든 내용이 사라집니다.</p>
      <div class="modal-actions">
        <button id="cancelBtn">취소</button>
        <button class="primary" id="confirmBtn">지우기</button>
      </div>
    </div>
  </div>

  <script>
    const memo = document.getElementById('memo');
    const clearBtn = document.getElementById('clearBtn');
    const shareFab = document.getElementById('shareFab');
    const themeToggle = document.getElementById('themeToggle');
    const snackbar = document.getElementById('snackbar');
    const modalBackdrop = document.getElementById('modalBackdrop');
    const cancelBtn = document.getElementById('cancelBtn');
    const confirmBtn = document.getElementById('confirmBtn');
    const themeColorMeta = document.getElementById('themeColorMeta');
    const themeIcons = themeToggle.querySelectorAll('.theme-icon');

    const STORAGE_KEY = 'quickmemo';
    const THEME_KEY = 'quickmemo_theme';
    const MODES = ['auto', 'light', 'dark'];
    const LABELS = { auto: '자동', light: '라이트', dark: '다크' };

    // ===== Memo =====
    memo.value = localStorage.getItem(STORAGE_KEY) || '';
    memo.addEventListener('input', () => {
      localStorage.setItem(STORAGE_KEY, memo.value);
    });

    // ===== Snackbar =====
    let snackTimer = null;
    function showSnackbar(text) {
      snackbar.textContent = text;
      snackbar.classList.add('show');
      clearTimeout(snackTimer);
      snackTimer = setTimeout(() => snackbar.classList.remove('show'), 2000);
    }

    // ===== Theme management =====
    function getMode() {
      return localStorage.getItem(THEME_KEY) || 'auto';
    }
    function isCurrentlyDark() {
      const m = getMode();
      if (m === 'dark') return true;
      if (m === 'light') return false;
      return window.matchMedia('(prefers-color-scheme: dark)').matches;
    }
    function applyTheme() {
      const mode = getMode();
      const root = document.documentElement;
      if (mode === 'auto') root.removeAttribute('data-theme');
      else root.setAttribute('data-theme', mode);

      // 아이콘 스왑
      themeIcons.forEach(svg => {
        svg.classList.toggle('active', svg.dataset.mode === mode);
      });

      applyTimeTint();
    }
    themeToggle.addEventListener('click', () => {
      const current = getMode();
      const next = MODES[(MODES.indexOf(current) + 1) % MODES.length];
      localStorage.setItem(THEME_KEY, next);
      applyTheme();
      showSnackbar(`${LABELS[next]} 모드`);
    });

    // ===== Clear =====
    clearBtn.addEventListener('click', () => modalBackdrop.classList.add('show'));
    cancelBtn.addEventListener('click', () => modalBackdrop.classList.remove('show'));
    modalBackdrop.addEventListener('click', (e) => {
      if (e.target === modalBackdrop) modalBackdrop.classList.remove('show');
    });
    confirmBtn.addEventListener('click', () => {
      memo.value = '';
      localStorage.setItem(STORAGE_KEY, '');
      modalBackdrop.classList.remove('show');
      showSnackbar('메모를 비웠어요');
      memo.focus();
    });

    // ===== Share =====
    shareFab.addEventListener('click', async () => {
      const text = memo.value.trim();
      if (!text) {
        showSnackbar('공유할 내용이 없어요');
        return;
      }
      if (navigator.share) {
        try { await navigator.share({ text }); } catch (_) { /* canceled */ }
      } else {
        try {
          await navigator.clipboard.writeText(text);
          showSnackbar('클립보드에 복사했어요');
        } catch (_) {
          showSnackbar('공유를 지원하지 않는 환경이에요');
        }
      }
    });

    // ===== Time-based tint =====
    function applyTimeTint() {
      const hour = new Date().getHours();
      const dark = isCurrentlyDark();

      let h, sLight, lLight, sDark, lDark;
      if (hour >= 5 && hour < 11) {
        h = 38;  sLight = 28; lLight = 97;   sDark = 14; lDark = 7.5;
      } else if (hour >= 11 && hour < 17) {
        h = 42;  sLight = 8;  lLight = 97.5; sDark = 10; lDark = 7;
      } else if (hour >= 17 && hour < 21) {
        h = 28;  sLight = 30; lLight = 96;   sDark = 20; lDark = 7;
      } else {
        h = 248; sLight = 16; lLight = 96.5; sDark = 22; lDark = 6;
      }

      const bg = dark
        ? `hsl(${h}, ${sDark}%, ${lDark}%)`
        : `hsl(${h}, ${sLight}%, ${lLight}%)`;
      document.documentElement.style.setProperty('--bg', bg);
      document.documentElement.style.setProperty('--surface', bg);
      themeColorMeta.setAttribute('content', bg);
    }

    // Initial setup
    applyTheme();              // applies time tint inside
    setInterval(applyTimeTint, 60_000);
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
