<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" id="themeColorMeta" content="#FAFAF8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="메모" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png" />

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
  />

  <title>메모</title>
  <style>
    :root {
      --bg: #FAFAF8;
      --surface: #FAFAF8;
      --divider: rgba(30, 27, 46, 0.10);
      --text-primary: #1E1B2E;
      --text-secondary: #6B6880;
      --accent: #6B4DFF;
      --accent-glow: rgba(107, 77, 255, 0.55);
      --accent-soft: #EFEAFF;
      --accent-on: #FFFFFF;
      --pill-outline-bg: rgba(255, 255, 255, 0.55);
      --pill-outline-border: rgba(30, 27, 46, 0.10);
      --shadow-pill-outline: 0 4px 16px rgba(30, 27, 46, 0.06);

      --memo-color-red:   #E53935;
      --memo-color-blue:  #1E88E5;
      --memo-color-green: #43A047;
      --memo-color-gray:  #757575;
      --memo-color-black: #1E1B2E;

      --memo-font-size: 13pt;
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg: #0F0D14;
        --surface: #0F0D14;
        --divider: rgba(255, 255, 255, 0.12);
        --text-primary: #F3F1FF;
        --text-secondary: #8E8B9F;
        --accent: #9C85FF;
        --accent-glow: rgba(156, 133, 255, 0.55);
        --accent-soft: #2A2350;
        --accent-on: #0F0D14;
        --pill-outline-bg: rgba(255, 255, 255, 0.06);
        --pill-outline-border: rgba(255, 255, 255, 0.12);
        --shadow-pill-outline: 0 6px 18px rgba(0, 0, 0, 0.35);

        --memo-color-red:   #FF6B6B;
        --memo-color-blue:  #64B5F6;
        --memo-color-green: #81C784;
        --memo-color-gray:  #BDBDBD;
        --memo-color-black: #F3F1FF;
      }
    }
    :root[data-theme="dark"] {
      --bg: #0F0D14;
      --surface: #0F0D14;
      --divider: rgba(255, 255, 255, 0.12);
      --text-primary: #F3F1FF;
      --text-secondary: #8E8B9F;
      --accent: #9C85FF;
      --accent-glow: rgba(156, 133, 255, 0.55);
      --accent-soft: #2A2350;
      --accent-on: #0F0D14;
      --pill-outline-bg: rgba(255, 255, 255, 0.06);
      --pill-outline-border: rgba(255, 255, 255, 0.12);
      --shadow-pill-outline: 0 6px 18px rgba(0, 0, 0, 0.35);

      --memo-color-red:   #FF6B6B;
      --memo-color-blue:  #64B5F6;
      --memo-color-green: #81C784;
      --memo-color-gray:  #BDBDBD;
      --memo-color-black: #F3F1FF;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; height: 100%; overscroll-behavior: none; }

    body {
      font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont,
        "Apple SD Gothic Neo", "Noto Sans KR", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      height: 100vh;
      height: 100dvh;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
      position: relative;
      transition: background-color 0.45s ease, color 0.3s ease;
    }

    .memo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      outline: none;
      background: transparent;
      color: var(--text-primary);
      font-size: var(--memo-font-size);
      font-weight: 420;
      line-height: 1.85;
      letter-spacing: -0.01em;
      font-family: inherit;
      text-align: left;
      padding: calc(72px + env(safe-area-inset-top)) 28px
        calc(40px + env(safe-area-inset-bottom));
      -webkit-user-select: text;
      user-select: text;
      overflow-y: auto;
      caret-color: var(--accent);
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-wrap: break-word;
      transition: font-size 0.2s ease;

      -webkit-mask-image: linear-gradient(
        to bottom,
        transparent 0,
        #000 56px,
        #000 calc(100% - 48px),
        transparent 100%
      );
      mask-image: linear-gradient(
        to bottom,
        transparent 0,
        #000 56px,
        #000 calc(100% - 48px),
        transparent 100%
      );

      scrollbar-width: none;
      animation: fadeIn 0.6s ease-out 0.05s both;
    }
    .memo::-webkit-scrollbar { width: 0; }

    @keyframes caretPulse {
      0%, 100% { caret-color: var(--accent); }
      50%      { caret-color: var(--accent-glow); }
    }
    .memo:focus {
      animation: fadeIn 0.6s ease-out 0.05s both,
                 caretPulse 2.4s ease-in-out 1s infinite;
    }

    /* 메모 색상 클래스 - CSS 변수 참조해서 테마 자동 적응 */
    .memo .mc-red   { color: var(--memo-color-red); }
    .memo .mc-blue  { color: var(--memo-color-blue); }
    .memo .mc-green { color: var(--memo-color-green); }
    .memo .mc-gray  { color: var(--memo-color-gray); }
    .memo .mc-black { color: var(--memo-color-black); }

    /* 서식 태그 - 기본 스타일 명시 (브라우저별 차이 방지) */
    .memo b, .memo strong { font-weight: 700; }
    .memo i, .memo em { font-style: italic; }
    .memo u, .memo ins { text-decoration: underline; }

    /* 종이결 */
    .paper-grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.18;
      mix-blend-mode: multiply;
      background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 220 220'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 220px 220px;
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) .paper-grain {
        opacity: 0.10;
        mix-blend-mode: screen;
      }
    }
    :root[data-theme="dark"] .paper-grain {
      opacity: 0.10;
      mix-blend-mode: screen;
    }

    /* 스크롤 진행 */
    .scroll-progress {
      position: fixed;
      right: 0;
      top: 0;
      width: 2px;
      height: 0;
      background: var(--accent);
      border-radius: 1px;
      z-index: 4;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }
    .scroll-progress.visible { opacity: 0.4; }

    .top-actions-left, .top-actions-right {
      position: absolute;
      top: calc(12px + env(safe-area-inset-top));
      display: flex;
      gap: 6px;
      z-index: 5;
    }
    .top-actions-left {
      left: calc(16px + env(safe-area-inset-left));
      animation: dropIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) 0.25s both;
    }
    .top-actions-right {
      right: calc(16px + env(safe-area-inset-right));
      animation: dropIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) 0.25s both;
    }

    .pill {
      width: 56px;
      height: 36px;
      border: none;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.3s ease, color 0.3s ease;
      padding: 0;
      font-family: inherit;
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      backdrop-filter: blur(24px) saturate(180%);
    }
    .pill:active { transform: scale(0.94); }
    .pill svg {
      width: 18px;
      height: 18px;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .pill.outline {
      background: var(--pill-outline-bg);
      color: var(--text-secondary);
      border: 1px solid var(--pill-outline-border);
      box-shadow: var(--shadow-pill-outline);
    }
    .pill .theme-icon { display: none; }
    .pill .theme-icon.active {
      display: block;
      animation: iconPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .size-label {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text-primary);
    }
    .color-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--memo-color-black);
      transition: background 0.2s ease;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.06);
    }

    /* 사이즈/색상 팝오버 */
    .popover {
      position: absolute;
      top: calc(56px + env(safe-area-inset-top));
      left: calc(16px + env(safe-area-inset-left));
      background: var(--pill-outline-bg);
      border: 1px solid var(--pill-outline-border);
      border-radius: 18px;
      padding: 6px;
      display: none;
      gap: 2px;
      z-index: 10;
      box-shadow: 0 12px 30px rgba(0,0,0,0.16);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      backdrop-filter: blur(24px) saturate(180%);
      animation: popoverIn 0.22s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .popover.show { display: flex; }
    .popover-item {
      min-width: 30px;
      height: 30px;
      border: none;
      background: transparent;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      padding: 0 8px;
      transition: background 0.15s ease;
    }
    .popover-item:active { background: var(--accent-soft); }
    .popover-item.selected {
      background: var(--accent);
      color: var(--accent-on);
    }
    .popover-item .color-swatch {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.08);
    }

    /* 서식 툴바 (B / I / S) */
    .format-toolbar {
      position: fixed;
      display: none;
      background: var(--text-primary);
      border-radius: 16px;
      padding: 4px;
      gap: 2px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.32);
      z-index: 50;
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      animation: popIn 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .format-toolbar.show { display: flex; }
    .format-toolbar button {
      width: 38px;
      height: 32px;
      border: none;
      background: transparent;
      color: var(--bg);
      font-size: 14px;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      transition: background 0.15s ease, color 0.15s ease;
      padding: 0;
    }
    .format-toolbar button:active { background: rgba(255,255,255,0.12); }
    .format-toolbar button.active {
      background: var(--accent);
      color: var(--accent-on);
    }
    .fmt-b { font-weight: 800; }
    .fmt-i { font-style: italic; font-weight: 600; }
    .fmt-u { text-decoration: underline; font-weight: 600; }

    .snackbar {
      position: fixed;
      left: 50%;
      bottom: calc(40px + env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(20px);
      background: var(--text-primary);
      color: var(--bg);
      padding: 12px 22px;
      border-radius: 24px;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      z-index: 20;
    }
    .snackbar.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.42);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 30;
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
      animation: fadeIn 0.2s ease-out;
    }
    .modal-backdrop.show { display: flex; }
    .modal {
      background: var(--surface);
      color: var(--text-primary);
      padding: 24px;
      border-radius: 22px;
      max-width: 320px;
      width: calc(100% - 48px);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.3);
      animation: popIn 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
      text-align: left;
    }
    .modal h3 { margin: 0 0 8px; font-size: 17px; font-weight: 700; }
    .modal p { margin: 0 0 22px; font-size: 14px; color: var(--text-secondary); line-height: 1.5; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 4px; }
    .modal button {
      padding: 10px 18px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: var(--accent);
      font-family: inherit;
      transition: background 0.15s ease;
    }
    .modal button:active { background: var(--accent-soft); }
    .modal button.primary {
      background: var(--accent);
      color: var(--accent-on);
    }
    .modal button.primary:active { opacity: 0.85; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes dropIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes popIn { 0% { opacity: 0; transform: scale(0.6); } 100% { opacity: 1; transform: scale(1); } }
    @keyframes popoverIn { from { opacity: 0; transform: translateY(-6px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes iconPop { 0% { opacity: 0; transform: scale(0.5) rotate(-45deg); } 100% { opacity: 1; transform: scale(1) rotate(0); } }
  </style>
</head>
<body>
  <div class="paper-grain" aria-hidden="true"></div>
  <div class="scroll-progress" id="scrollProgress" aria-hidden="true"></div>

  <div
    class="memo"
    id="memo"
    contenteditable="true"
    spellcheck="false"
    autocorrect="off"
    autocapitalize="sentences"
    inputmode="text"
    role="textbox"
    aria-multiline="true"></div>

  <!-- 좌상단 -->
  <div class="top-actions-left">
    <button class="pill outline" id="sizeBtn" aria-label="글씨 크기">
      <span class="size-label" id="sizeLabel">13</span>
    </button>
    <button class="pill outline" id="colorBtn" aria-label="글씨 색">
      <span class="color-dot" id="colorDot"></span>
    </button>
  </div>

  <div class="popover" id="sizePopover"></div>
  <div class="popover" id="colorPopover"></div>

  <!-- 우상단 -->
  <div class="top-actions-right">
    <button class="pill outline" id="themeToggle" aria-label="테마 전환">
      <svg class="theme-icon" data-mode="auto" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12,2 C6.48,2 2,6.48 2,12 C2,17.52 6.48,22 12,22 C17.52,22 22,17.52 22,12 C22,6.48 17.52,2 12,2 Z M12,4 C16.42,4 20,7.58 20,12 C20,16.42 16.42,20 12,20 L12,4 Z" />
      </svg>
      <svg class="theme-icon" data-mode="light" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <circle cx="12" cy="12" r="4.5"/>
        <g stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none">
          <line x1="12" y1="2.5" x2="12" y2="4.5"/>
          <line x1="12" y1="19.5" x2="12" y2="21.5"/>
          <line x1="2.5" y1="12" x2="4.5" y2="12"/>
          <line x1="19.5" y1="12" x2="21.5" y2="12"/>
          <line x1="5.2" y1="5.2" x2="6.6" y2="6.6"/>
          <line x1="17.4" y1="17.4" x2="18.8" y2="18.8"/>
          <line x1="5.2" y1="18.8" x2="6.6" y2="17.4"/>
          <line x1="17.4" y1="6.6" x2="18.8" y2="5.2"/>
        </g>
      </svg>
      <svg class="theme-icon" data-mode="dark" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>

    <button class="pill outline" id="clearBtn" aria-label="메모 지우기">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M6,19c0,1.1 0.9,2 2,2h8c1.1,0 2,-0.9 2,-2V7H6v12zM19,4h-3.5l-1,-1h-5l-1,1H5v2h14V4z" />
      </svg>
    </button>
  </div>

  <!-- 서식 툴바 -->
  <div class="format-toolbar" id="formatToolbar" role="toolbar" aria-label="텍스트 서식">
    <button data-cmd="bold" aria-label="굵게"><span class="fmt-b">B</span></button>
    <button data-cmd="italic" aria-label="기울임"><span class="fmt-i">I</span></button>
    <button data-cmd="underline" aria-label="밑줄"><span class="fmt-u">U</span></button>
  </div>

  <div class="snackbar" id="snackbar"></div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" role="dialog" aria-modal="true">
      <h3>메모를 지울까요?</h3>
      <p>작성된 모든 내용이 사라집니다.</p>
      <div class="modal-actions">
        <button id="cancelBtn">취소</button>
        <button class="primary" id="confirmBtn">지우기</button>
      </div>
    </div>
  </div>

  <script>
    const memo = document.getElementById('memo');
    const clearBtn = document.getElementById('clearBtn');
    const themeToggle = document.getElementById('themeToggle');
    const sizeBtn = document.getElementById('sizeBtn');
    const sizeLabel = document.getElementById('sizeLabel');
    const colorBtn = document.getElementById('colorBtn');
    const colorDot = document.getElementById('colorDot');
    const sizePopover = document.getElementById('sizePopover');
    const colorPopover = document.getElementById('colorPopover');
    const snackbar = document.getElementById('snackbar');
    const modalBackdrop = document.getElementById('modalBackdrop');
    const cancelBtn = document.getElementById('cancelBtn');
    const confirmBtn = document.getElementById('confirmBtn');
    const themeColorMeta = document.getElementById('themeColorMeta');
    const themeIcons = themeToggle.querySelectorAll('.theme-icon');
    const scrollProgress = document.getElementById('scrollProgress');
    const formatToolbar = document.getElementById('formatToolbar');

    const STORAGE_KEY = 'quickmemo';
    const THEME_KEY = 'quickmemo_theme';
    const SIZE_KEY = 'quickmemo_size';
    const COLOR_KEY = 'quickmemo_color';
    const MODES = ['auto', 'light', 'dark'];
    const LABELS = { auto: '자동', light: '라이트', dark: '다크' };
    const SIZES = [8, 9, 10, 11, 12, 13, 14, 15];
    const COLORS = [
      { key: 'black', name: '검정' },
      { key: 'red',   name: '빨강' },
      { key: 'blue',  name: '파랑' },
      { key: 'green', name: '초록' },
      { key: 'gray',  name: '회색' }
    ];
    const DEFAULT_SIZE = 13;
    const DEFAULT_COLOR = 'black';
    const HTML_RE = /<[a-z!\/][\s\S]*?>/i;
    const ENDS_BR_RE = /<br\s*\/?>\s*$/i;

    // ===== Save =====
    function persistMemo() {
      // 빈/ZWSP만 있는 span은 깔끔하게 제거한 복사본으로 저장
      try {
        const clone = memo.cloneNode(true);
        clone.querySelectorAll('span').forEach(span => {
          const t = span.textContent;
          if (t === '' || t === '​') {
            span.remove();
          } else if (t.startsWith('​')) {
            // 선행 ZWSP 제거
            const walker = document.createTreeWalker(span, NodeFilter.SHOW_TEXT);
            const first = walker.nextNode();
            if (first && first.textContent.startsWith('​')) {
              first.textContent = first.textContent.substring(1);
            }
          }
        });
        localStorage.setItem(STORAGE_KEY, clone.innerHTML);
      } catch (_) {
        try { localStorage.setItem(STORAGE_KEY, memo.innerHTML); } catch (_) {}
      }
    }

    // 기존 데이터의 hex 색(이전 버전 저장)을 클래스로 마이그레이션
    const HEX_TO_KEY = {};
    [
      ['#e53935','red'], ['rgb(229, 57, 53)','red'],
      ['#1e88e5','blue'], ['rgb(30, 136, 229)','blue'],
      ['#43a047','green'], ['rgb(67, 160, 71)','green'],
      ['#757575','gray'], ['rgb(117, 117, 117)','gray'],
      ['#1e1b2e','black'], ['rgb(30, 27, 46)','black'],
      ['#ff6b6b','red'], ['rgb(255, 107, 107)','red'],
      ['#64b5f6','blue'], ['rgb(100, 181, 246)','blue'],
      ['#81c784','green'], ['rgb(129, 199, 132)','green'],
      ['#bdbdbd','gray'], ['rgb(189, 189, 189)','gray'],
      ['#f3f1ff','black'], ['rgb(243, 241, 255)','black'],
    ].forEach(([k, v]) => { HEX_TO_KEY[k.toLowerCase()] = v; });

    function migrateInlineColors(root) {
      root.querySelectorAll('[style*="color"]').forEach(el => {
        const c = (el.style.color || '').toLowerCase();
        const key = HEX_TO_KEY[c];
        if (key) {
          el.style.color = '';
          if (!el.getAttribute('style')?.trim()) el.removeAttribute('style');
          el.classList.add(`mc-${key}`);
        }
      });
      root.querySelectorAll('font[color]').forEach(el => {
        const c = (el.getAttribute('color') || '').toLowerCase();
        const key = HEX_TO_KEY[c];
        const span = document.createElement('span');
        if (key) span.className = `mc-${key}`;
        else span.style.color = el.getAttribute('color');
        while (el.firstChild) span.appendChild(el.firstChild);
        el.parentNode.replaceChild(span, el);
      });
    }

    // ===== Load + auto newline =====
    (function loadMemo() {
      const saved = localStorage.getItem(STORAGE_KEY) || '';
      if (HTML_RE.test(saved)) {
        memo.innerHTML = saved;
      } else {
        memo.textContent = saved;
      }
      // 이전 버전의 hex 색을 클래스로 변환 (테마 자동 적응 회복)
      migrateInlineColors(memo);
      // 끝에 줄바꿈 자동 추가 (자연스러운 새 줄에서 시작)
      const html = memo.innerHTML;
      if (html.length > 0 && !ENDS_BR_RE.test(html)) {
        memo.appendChild(document.createElement('br'));
        persistMemo();
      }
      // 커서 끝으로
      requestAnimationFrame(() => {
        try {
          const range = document.createRange();
          range.selectNodeContents(memo);
          range.collapse(false);
          const sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);
        } catch (_) {}
        memo.scrollTop = memo.scrollHeight;
      });
    })();

    memo.addEventListener('input', persistMemo);
    memo.addEventListener('blur', persistMemo);
    window.addEventListener('pagehide', persistMemo);
    window.addEventListener('beforeunload', persistMemo);
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') persistMemo();
    });

    // 붙여넣기는 평문만 받기 (외부 서식 침투 방지)
    memo.addEventListener('paste', (e) => {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text/plain');
      document.execCommand('insertText', false, text);
    });

    // ===== Snackbar =====
    let snackTimer = null;
    function showSnackbar(text) {
      snackbar.textContent = text;
      snackbar.classList.add('show');
      clearTimeout(snackTimer);
      snackTimer = setTimeout(() => snackbar.classList.remove('show'), 2000);
    }

    // ===== Size & Color =====
    function getSize() {
      const s = parseInt(localStorage.getItem(SIZE_KEY) || DEFAULT_SIZE, 10);
      return SIZES.includes(s) ? s : DEFAULT_SIZE;
    }
    function getColor() {
      const c = localStorage.getItem(COLOR_KEY) || DEFAULT_COLOR;
      return COLORS.some(x => x.key === c) ? c : DEFAULT_COLOR;
    }

    function resolveCssColor(varExpr) {
      const probe = document.createElement('span');
      probe.style.color = varExpr;
      probe.style.display = 'none';
      document.body.appendChild(probe);
      const v = getComputedStyle(probe).color;
      document.body.removeChild(probe);
      return v;
    }

    function applyMemoStyle() {
      const s = getSize();
      const c = getColor();
      document.documentElement.style.setProperty('--memo-font-size', s + 'pt');
      sizeLabel.textContent = String(s);
      colorDot.style.background = `var(--memo-color-${c})`;
    }

    // 텍스트 노드 단위 래핑 (block 경계 안전 - 줄바꿈 안 생김)
    function wrapTextNodesInRange(range, tagName, className) {
      const startContainer = range.startContainer;
      const endContainer = range.endContainer;
      const startOffset = range.startOffset;
      const endOffset = range.endOffset;
      const ancestor = range.commonAncestorContainer;
      const root = ancestor.nodeType === Node.TEXT_NODE ? ancestor.parentNode : ancestor;

      const textNodes = [];
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
      let n;
      while ((n = walker.nextNode())) {
        if (range.intersectsNode(n)) textNodes.push(n);
      }

      textNodes.forEach(node => {
        let s = 0;
        let e = node.textContent.length;
        if (node === startContainer) s = Math.max(s, startOffset);
        if (node === endContainer) e = Math.min(e, endOffset);
        if (s >= e) return;
        const full = node.textContent;
        const before = full.substring(0, s);
        const middle = full.substring(s, e);
        const after = full.substring(e);
        if (!middle) return;

        const parent = node.parentNode;
        const wrapper = document.createElement(tagName);
        if (className) wrapper.className = className;
        wrapper.textContent = middle;

        if (before) parent.insertBefore(document.createTextNode(before), node);
        parent.insertBefore(wrapper, node);
        if (after) parent.insertBefore(document.createTextNode(after), node);
        parent.removeChild(node);
      });
    }

    function isWrappedByTag(range, tagName) {
      const tag = tagName.toUpperCase();
      let node = range.startContainer;
      while (node && node !== memo) {
        if (node.nodeName === tag) return true;
        node = node.parentNode;
      }
      return false;
    }

    function unwrapTagInRange(range, tagName) {
      const tag = tagName.toUpperCase();
      const ancestor = range.commonAncestorContainer;
      const root = ancestor.nodeType === Node.TEXT_NODE ? ancestor.parentNode : ancestor;
      const elements = [];
      let node = range.startContainer;
      while (node && node !== memo) {
        if (node.nodeName === tag) elements.push(node);
        node = node.parentNode;
      }
      if (root.querySelectorAll) {
        root.querySelectorAll(tagName).forEach(el => {
          if (range.intersectsNode(el)) elements.push(el);
        });
      }
      Array.from(new Set(elements)).forEach(el => {
        const parent = el.parentNode;
        while (el.firstChild) parent.insertBefore(el.firstChild, el);
        parent.removeChild(el);
      });
    }

    function toggleFormatTag(tagName) {
      const sel = window.getSelection();
      if (!sel || sel.rangeCount === 0) return;
      const range = sel.getRangeAt(0);
      if (!memo.contains(range.commonAncestorContainer)) return;
      if (range.collapsed) return;

      if (isWrappedByTag(range, tagName)) {
        unwrapTagInRange(range, tagName);
      } else {
        wrapTextNodesInRange(range, tagName, null);
      }
      persistMemo();
      updateToolbarState();
    }

    function applyColorAtSelection(colorKey) {
      const sel = window.getSelection();

      // 이미 메모 안에 선택이 있으면 그걸 그대로 사용 (포커스 안 건드림 → 선택 보존)
      if (sel && sel.rangeCount > 0) {
        const range = sel.getRangeAt(0);
        if (memo.contains(range.commonAncestorContainer)) {
          if (range.collapsed) {
            // 커서만: ZWSP 앵커 삽입, 다음 타이핑이 이 안으로 들어감
            const span = document.createElement('span');
            span.className = `mc-${colorKey}`;
            const anchor = document.createTextNode('​');
            span.appendChild(anchor);
            range.insertNode(span);
            const nr = document.createRange();
            nr.setStart(anchor, 1);
            nr.setEnd(anchor, 1);
            sel.removeAllRanges();
            sel.addRange(nr);
          } else {
            // 선택영역: 텍스트 노드 단위 래핑
            wrapTextNodesInRange(range, 'span', `mc-${colorKey}`);
          }
          persistMemo();
          memo.focus();
          return;
        }
      }

      // 메모에 선택 없음 - 끝에 앵커
      memo.focus();
      const range = document.createRange();
      range.selectNodeContents(memo);
      range.collapse(false);
      const s = window.getSelection();
      s.removeAllRanges();
      s.addRange(range);
      const span = document.createElement('span');
      span.className = `mc-${colorKey}`;
      const anchor = document.createTextNode('​');
      span.appendChild(anchor);
      range.insertNode(span);
      const nr = document.createRange();
      nr.setStart(anchor, 1);
      nr.setEnd(anchor, 1);
      s.removeAllRanges();
      s.addRange(nr);
      persistMemo();
    }

    function buildSizePopover() {
      sizePopover.innerHTML = '';
      const current = getSize();
      SIZES.forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'popover-item' + (s === current ? ' selected' : '');
        btn.textContent = s;
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          localStorage.setItem(SIZE_KEY, String(s));
          applyMemoStyle();
          buildSizePopover();
          closePopovers();
        });
        sizePopover.appendChild(btn);
      });
    }
    function buildColorPopover() {
      colorPopover.innerHTML = '';
      const current = getColor();
      COLORS.forEach(({ key, name }) => {
        const btn = document.createElement('button');
        btn.className = 'popover-item' + (key === current ? ' selected' : '');
        btn.setAttribute('aria-label', name);
        const sw = document.createElement('span');
        sw.className = 'color-swatch';
        sw.style.background = `var(--memo-color-${key})`;
        btn.appendChild(sw);
        btn.addEventListener('mousedown', (e) => e.preventDefault());
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          localStorage.setItem(COLOR_KEY, key);
          applyMemoStyle();
          applyColorAtSelection(key);
          buildColorPopover();
          closePopovers();
        });
        colorPopover.appendChild(btn);
      });
    }

    function openPopover(target) {
      closePopovers();
      const offsetLeft = target === colorPopover ? '78px' : '16px';
      target.style.left = `calc(${offsetLeft} + env(safe-area-inset-left))`;
      target.classList.add('show');
    }
    function closePopovers() {
      sizePopover.classList.remove('show');
      colorPopover.classList.remove('show');
    }

    sizeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      buildSizePopover();
      if (sizePopover.classList.contains('show')) closePopovers();
      else openPopover(sizePopover);
    });
    colorBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      buildColorPopover();
      if (colorPopover.classList.contains('show')) closePopovers();
      else openPopover(colorPopover);
    });
    document.addEventListener('click', () => closePopovers());

    // ===== Format toolbar (B / I / S) =====
    let toolbarTimer = null;
    function isSelectionInMemo() {
      const sel = window.getSelection();
      if (!sel || sel.rangeCount === 0) return false;
      const node = sel.anchorNode;
      return node && (memo === node || memo.contains(node));
    }
    function positionToolbar(range) {
      formatToolbar.style.visibility = 'hidden';
      formatToolbar.classList.add('show');
      const tw = formatToolbar.offsetWidth;
      const th = formatToolbar.offsetHeight;
      formatToolbar.style.visibility = '';

      const rect = range.getBoundingClientRect();
      const vw = window.innerWidth;
      const vh = window.visualViewport?.height || window.innerHeight;

      // 아래쪽 우선 (iOS 네이티브 메뉴는 보통 위쪽에 뜸 → 충돌 회피)
      let top = rect.bottom + 10;
      if (top + th > vh - 20) {
        top = rect.top - th - 10;
        if (top < 20) top = 20;
      }
      let left = rect.left + rect.width / 2 - tw / 2;
      left = Math.max(8, Math.min(vw - tw - 8, left));

      formatToolbar.style.left = `${left}px`;
      formatToolbar.style.top = `${top}px`;
    }
    function updateToolbarState() {
      const sel = window.getSelection();
      if (!sel || sel.rangeCount === 0) return;
      const range = sel.getRangeAt(0);
      if (!memo.contains(range.commonAncestorContainer)) return;
      [['bold','b'], ['italic','i'], ['underline','u']].forEach(([cmd, tag]) => {
        const btn = formatToolbar.querySelector(`[data-cmd="${cmd}"]`);
        if (!btn) return;
        btn.classList.toggle('active', isWrappedByTag(range, tag));
      });
    }
    function showFormatToolbar() {
      clearTimeout(toolbarTimer);
      toolbarTimer = setTimeout(() => {
        const sel = window.getSelection();
        if (!sel || sel.rangeCount === 0 || sel.isCollapsed || !isSelectionInMemo()) {
          formatToolbar.classList.remove('show');
          return;
        }
        const range = sel.getRangeAt(0);
        positionToolbar(range);
        updateToolbarState();
        formatToolbar.classList.add('show');
      }, 120);
    }
    document.addEventListener('selectionchange', showFormatToolbar);

    formatToolbar.addEventListener('mousedown', (e) => e.preventDefault());
    formatToolbar.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('mousedown', (e) => e.preventDefault());
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        const tag = { bold: 'b', italic: 'i', underline: 'u' }[btn.dataset.cmd];
        if (tag) toggleFormatTag(tag);
      });
    });

    // ===== Theme =====
    function getMode() { return localStorage.getItem(THEME_KEY) || 'auto'; }
    function isCurrentlyDark() {
      const m = getMode();
      if (m === 'dark') return true;
      if (m === 'light') return false;
      return window.matchMedia('(prefers-color-scheme: dark)').matches;
    }
    function applyTheme() {
      const mode = getMode();
      const root = document.documentElement;
      if (mode === 'auto') root.removeAttribute('data-theme');
      else root.setAttribute('data-theme', mode);
      themeIcons.forEach(svg => {
        svg.classList.toggle('active', svg.dataset.mode === mode);
      });
      applyTimeTint();
      applyMemoStyle();
    }
    themeToggle.addEventListener('click', () => {
      const current = getMode();
      const next = MODES[(MODES.indexOf(current) + 1) % MODES.length];
      localStorage.setItem(THEME_KEY, next);
      applyTheme();
      showSnackbar(`${LABELS[next]} 모드`);
    });

    // ===== Clear =====
    clearBtn.addEventListener('click', () => modalBackdrop.classList.add('show'));
    cancelBtn.addEventListener('click', () => modalBackdrop.classList.remove('show'));
    modalBackdrop.addEventListener('click', (e) => {
      if (e.target === modalBackdrop) modalBackdrop.classList.remove('show');
    });
    confirmBtn.addEventListener('click', () => {
      memo.innerHTML = '';
      localStorage.setItem(STORAGE_KEY, '');
      modalBackdrop.classList.remove('show');
      showSnackbar('메모를 비웠어요');
      memo.focus();
    });

    // ===== Time tint =====
    function applyTimeTint() {
      const hour = new Date().getHours();
      const dark = isCurrentlyDark();
      let h, sLight, lLight, sDark, lDark;
      if (hour >= 5 && hour < 11) {
        h = 38;  sLight = 28; lLight = 97;   sDark = 14; lDark = 7.5;
      } else if (hour >= 11 && hour < 17) {
        h = 42;  sLight = 8;  lLight = 97.5; sDark = 10; lDark = 7;
      } else if (hour >= 17 && hour < 21) {
        h = 28;  sLight = 30; lLight = 96;   sDark = 20; lDark = 7;
      } else {
        h = 248; sLight = 16; lLight = 96.5; sDark = 22; lDark = 6;
      }
      const bg = dark
        ? `hsl(${h}, ${sDark}%, ${lDark}%)`
        : `hsl(${h}, ${sLight}%, ${lLight}%)`;
      document.documentElement.style.setProperty('--bg', bg);
      document.documentElement.style.setProperty('--surface', bg);
      themeColorMeta.setAttribute('content', bg);
    }

    // ===== Scroll progress =====
    function updateScrollProgress() {
      const max = memo.scrollHeight - memo.clientHeight;
      if (max <= 2) {
        scrollProgress.classList.remove('visible');
        return;
      }
      const ratio = Math.max(0, Math.min(1, memo.scrollTop / max));
      const viewportH = window.innerHeight;
      const visibleRatio = memo.clientHeight / memo.scrollHeight;
      const thumbH = Math.max(40, viewportH * visibleRatio);
      const thumbTop = (viewportH - thumbH) * ratio;
      scrollProgress.style.height = thumbH + 'px';
      scrollProgress.style.top = thumbTop + 'px';
      scrollProgress.classList.add('visible');
    }
    memo.addEventListener('scroll', updateScrollProgress, { passive: true });
    memo.addEventListener('input', updateScrollProgress);
    window.addEventListener('resize', updateScrollProgress);
    requestAnimationFrame(updateScrollProgress);

    // ===== Init =====
    applyTheme();
    setInterval(applyTimeTint, 60_000);
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
